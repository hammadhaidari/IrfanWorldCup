<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Clean Live Stream Player</title>
    
    <!-- Shaka Player Files -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.15.10/shaka-player.compiled.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.15.10/shaka-player.ui.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.15.10/controls.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">

    <style>
        /* Full-screen setup */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .viewport-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #141414 0%, #000000 100%);
        }

        .player-container {
            position: relative;
            width: 100%;
            height: 100%;
            background-color: #000;
        }

        video {
            width: 100%;
            height: 100%;
            background: #000;
        }

        /* Customize Shaka UI style */
        .shaka-video-container {
            width: 100%;
            height: 100%;
        }

        /* Desktop/Tablet 16:9 player box */
        @media (min-width: 768px) {
            .player-container {
                width: 90vw;
                height: 50.625vw; /* 16:9 Aspect Ratio */
                max-width: 1120px;
                max-height: 630px;
                border-radius: 16px;
                overflow: hidden;
                box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7), 0 0 50px rgba(0, 188, 212, 0.15);
                border: 1px solid rgba(255, 255, 255, 0.05);
            }
        }
    </style>
</head>
<body>

    <div class="viewport-wrapper">
        <!-- Shaka Video Player Container -->
        <div id="player-container" class="player-container shaka-video-container" data-shaka-player-container>
            <video autoplay id="video" data-shaka-player playsinline></video>
        </div>
    </div>

    <script>
        // Direct stream source details scraped from the backend embed
        const manifestUri = 'https://bia-cf.live.pv-cdn.net/iad-nitro/live/dash/enc/w0rehjjrwe/out/v1/69a2a7041395406b970598f61680e7cf/cenc.mpd';
        const clearKeyKid = '14eeabf30c14b7fbf3008c03099ce011';
        const clearKeyKey = '17d2ac8dbc5429bd70af3433aa12158d';

        async function initApp() {
            // Install polyfills to patch browser differences
            shaka.polyfill.installAll();

            if (!shaka.Player.isBrowserSupported()) {
                console.error('Browser not supported!');
                alert('Your device does not support playing this stream natively.');
                return;
            }

            const video = document.getElementById('video');
            const container = document.getElementById('player-container');

            // Initialize the Shaka Player instance
            const player = new shaka.Player(video);

            // Construct Shaka Player UI Controls
            const ui = new shaka.ui.Overlay(player, container, video);
            ui.configure({
                controlPanelElements: ['play_pause', 'time_and_duration', 'spacer', 'mute', 'volume', 'fullscreen'],
            });

            // Configure ClearKey DRM Decryption
            player.configure({
                drm: {
                    clearKeys: {
                        [clearKeyKid]: clearKeyKey
                    }
                },
                streaming: {
                    liveSync: { enabled: true, targetLatency: 6, minLatency: 5, maxLatency: 25 },
                    rebufferingGoal: 3,
                    bufferingGoal: 4,
                }
            });

            player.addEventListener('error', onErrorEvent);

            try {
                await player.load(manifestUri);
                console.log('The video stream loaded successfully!');
                
                if (player.isLive()) {
                    try { player.goToLive(); } catch (e) {}
                }
            } catch (error) {
                onError(error);
            }
        }

        function onErrorEvent(event) {
            onError(event.detail);
        }

        function onError(error) {
            console.error('Shaka Player Error Code:', error.code, 'Object:', error);
        }

        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
