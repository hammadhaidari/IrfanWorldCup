<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Live Stream Player</title>
    <style>
        /* Reset and full-screen setup */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* Full screen container holding the player */
        .viewport-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #141414 0%, #000000 100%);
        }

        /* Responsive Player container with iOS iframe scaling fixes */
        .player-container {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 100%;
            max-height: 100%;
            overflow: hidden;
            -webkit-overflow-scrolling: touch; /* Smooth scrolling for iOS inner scroll */
        }

        /* Iframe styling positioned absolutely to prevent layout shifting */
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
            background-color: #000;
        }

        /* Premium Desktop/Tablet layout: Center player in standard 16:9 ratio */
        @media (min-width: 768px) {
            .player-container {
                width: 90vw;
                height: 50.625vw; /* 16:9 Aspect Ratio */
                max-width: 1120px;
                max-height: 630px;
                border-radius: 16px;
                box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7), 0 0 50px rgba(0, 188, 212, 0.15);
                border: 1px solid rgba(255, 255, 255, 0.05);
            }
        }
    </style>
</head>
<body>

    <div class="viewport-wrapper">
        <div class="player-container">
            <iframe 
                src="https://sportika.net/api/embed/tv/tsn-1" 
                allowfullscreen 
                webkitallowfullscreen 
                mozallowfullscreen 
                allow="autoplay *; fullscreen *; picture-in-picture *; encrypted-media *"
                sandbox="allow-scripts allow-same-origin allow-presentation">
            </iframe>
        </div>
    </div>

</body>
</html>
