<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Live Stream Player</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        .viewport-wrapper {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }

        .player-container {
            position: relative;
            width: 100%;
            height: 100%;
            background-color: #000;
            -webkit-overflow-scrolling: touch;
        }

        iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            border: 0;
            background-color: #000;
        }

        @media (min-width: 768px) {
            .player-container {
                width: 90vw;
                height: 50.625vw;
                max-width: 1120px;
                max-height: 630px;
                border-radius: 16px;
                overflow: hidden;
                box-shadow: 0 25px 50px -12px rgba(0,0,0,0.7), 0 0 50px rgba(0,188,212,0.15);
                border: 1px solid rgba(255,255,255,0.05);
            }
        }
    </style>
</head>
<body>
    <div class="viewport-wrapper">
        <div class="player-container">
            <iframe 
                src="https://sportika.net/api/embed/tv/tsn-1" 
                allowfullscreen 
                webkitallowfullscreen 
                mozallowfullscreen 
                allow="autoplay *; fullscreen *; picture-in-picture *; encrypted-media *">
            </iframe>
        </div>
    </div>
</body>
</html>
