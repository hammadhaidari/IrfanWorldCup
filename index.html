<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Live Stream Player</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        .viewport-wrapper {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }
        .player-container {
            position: relative;
            width: 100%;
            height: 100%;
            background: #000;
        }
        video {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            background: #000;
        }
        .loading-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #000;
            color: #fff;
            z-index: 10;
            transition: opacity 0.5s ease;
        }
        .spinner {
            border: 4px solid rgba(255,255,255,0.1);
            width: 50px; height: 50px;
            border-radius: 50%;
            border-left-color: #00bcd4;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        #status { font-size: 14px; opacity: 0.7; margin-top: 10px; }
        @media (min-width: 768px) {
            .player-container {
                width: 90vw;
                height: 50.625vw;
                max-width: 1120px;
                max-height: 630px;
                border-radius: 16px;
                overflow: hidden;
                box-shadow: 0 25px 50px -12px rgba(0,0,0,0.7), 0 0 50px rgba(0,188,212,0.15);
                border: 1px solid rgba(255,255,255,0.05);
            }
        }
    </style>
</head>
<body>
    <div class="viewport-wrapper">
        <div class="player-container">
            <div id="loading" class="loading-overlay">
                <div class="spinner"></div>
                <div id="loading-text">Connecting to live stream...</div>
                <div id="status"></div>
            </div>
            <video id="video" autoplay playsinline controls></video>
        </div>
    </div>

    <!-- hls.js for non-Safari browsers (Chrome, Firefox, etc.) -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <script>
        const video = document.getElementById('video');
        const loadingEl = document.getElementById('loading');
        const loadingText = document.getElementById('loading-text');
        const statusEl = document.getElementById('status');

        // Stream URL — relative when served from the proxy server
        const streamUrl = './live.m3u8';

        function hideLoading() {
            loadingEl.style.opacity = '0';
            setTimeout(() => loadingEl.style.display = 'none', 500);
        }

        function showError(msg) {
            loadingText.style.color = '#ff4444';
            loadingText.innerText = msg;
        }

        async function waitForStream() {
            statusEl.innerText = 'Waiting for server to start decrypting...';
            for (let i = 0; i < 40; i++) {
                try {
                    const resp = await fetch(streamUrl, { method: 'HEAD' });
                    if (resp.ok) return true;
                } catch (e) { /* retry */ }
                await new Promise(r => setTimeout(r, 2000));
                statusEl.innerText = `Starting stream... (${i * 2}s)`;
            }
            return false;
        }

        async function init() {
            const ready = await waitForStream();
            if (!ready) {
                showError('Server is still starting up. Please refresh in 30 seconds.');
                return;
            }

            // iOS Safari: native HLS support — just set src
            if (video.canPlayType('application/vnd.apple.mpegurl')) {
                loadingText.innerText = 'Loading stream...';
                video.src = streamUrl;
                video.addEventListener('loadeddata', hideLoading);
                video.addEventListener('playing', hideLoading);
                video.addEventListener('error', () => showError('Playback error. Please refresh.'));
                video.play().catch(() => {});
            }
            // Other browsers: use hls.js
            else if (Hls.isSupported()) {
                loadingText.innerText = 'Loading stream...';
                const hls = new Hls({
                    liveSyncDurationCount: 3,
                    liveMaxLatencyDurationCount: 6,
                    enableWorker: true,
                });
                hls.loadSource(streamUrl);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play().catch(() => {});
                    hideLoading();
                });
                hls.on(Hls.Events.ERROR, (event, data) => {
                    if (data.fatal) {
                        showError('Stream error. Retrying...');
                        setTimeout(() => hls.loadSource(streamUrl), 3000);
                    }
                });
            } else {
                showError('Your browser does not support HLS playback.');
            }
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
