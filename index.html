<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Live Stream Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        .viewport-wrapper {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }

        .player-container {
            position: relative;
            width: 100%;
            height: 100%;
            background-color: #000;
        }

        video {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
        }

        /* Premium loading overlay */
        .loading-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #0d0d0d;
            color: #fff;
            z-index: 10;
            transition: opacity 0.5s ease;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border-left-color: #00bcd4;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #status {
            font-size: 14px;
            opacity: 0.7;
            margin-top: 10px;
            font-weight: 600;
            color: #00bcd4;
        }

        @media (min-width: 768px) {
            .player-container {
                width: 90vw;
                height: 50.625vw; /* 16:9 Aspect Ratio */
                max-width: 1120px;
                max-height: 630px;
                border-radius: 16px;
                overflow: hidden;
                box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7), 0 0 50px rgba(0, 188, 212, 0.15);
                border: 1px solid rgba(255, 255, 255, 0.05);
            }
        }
    </style>
</head>
<body>

    <div class="viewport-wrapper">
        <div class="player-container">
            <div id="loading" class="loading-overlay">
                <div class="spinner"></div>
                <div id="loading-text" style="font-size: 18px; font-weight: 600;">Connecting to live stream...</div>
                <div id="status">Starting playback engine...</div>
            </div>
            <!-- Native video element with custom playsinline and airplay attributes -->
            <video id="video" autoplay playsinline controls x-webkit-airplay="allow"></video>
        </div>
    </div>

    <!-- Hls.js for desktop and non-Safari browsers -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <script>
        const video = document.getElementById('video');
        const loadingEl = document.getElementById('loading');
        const loadingText = document.getElementById('loading-text');
        const statusEl = document.getElementById('status');

        // Relative path to HLS stream served from the same Flask server
        const streamUrl = './live.m3u8';

        function hideLoading() {
            loadingEl.style.opacity = '0';
            setTimeout(() => loadingEl.style.display = 'none', 500);
        }

        function showError(msg) {
            loadingText.style.color = '#f44336';
            loadingText.innerText = msg;
            statusEl.innerText = '';
        }

        async function verifyServerReady() {
            for (let i = 0; i < 30; i++) {
                try {
                    const resp = await fetch(streamUrl, { method: 'HEAD' });
                    if (resp.ok) return true;
                } catch (e) { /* retry */ }
                await new Promise(r => setTimeout(r, 1000));
                statusEl.innerText = `Preparing stream segments... (${i + 1}s)`;
            }
            return false;
        }

        async function init() {
            const ready = await verifyServerReady();
            if (!ready) {
                showError('Stream failed to load. Please refresh the page.');
                return;
            }

            statusEl.innerText = 'Initializing playback...';

            // iOS Safari Native HLS Playback
            if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = streamUrl;
                video.addEventListener('loadedmetadata', hideLoading);
                video.addEventListener('playing', hideLoading);
                video.addEventListener('error', () => showError('Playback failed. Please reload.'));
                video.play().catch(() => {});
            } 
            // PC & Other Browsers via Hls.js
            else if (Hls.isSupported()) {
                const hls = new Hls({
                    liveSyncDurationCount: 3,
                    liveMaxLatencyDurationCount: 6,
                    enableWorker: true
                });
                hls.loadSource(streamUrl);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play().catch(() => {});
                    hideLoading();
                });
                hls.on(Hls.Events.ERROR, (event, data) => {
                    if (data.fatal) {
                        statusEl.innerText = 'Buffering...';
                        hls.startLoad();
                    }
                });
            } else {
                showError('Your browser does not support live video playback.');
            }
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
