<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Live Stream Player</title>
    <style>
        /* Base styles */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .viewport-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #141414 0%, #000000 100%);
        }

        .player-container {
            position: relative;
            width: 100%;
            height: 100%;
            background-color: #000;
        }

        /* Iframe styling */
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
            background-color: #000;
        }

        /* Desktop/Tablet 16:9 box */
        @media (min-width: 768px) {
            .player-container {
                width: 90vw;
                height: 50.625vw; /* 16:9 Aspect Ratio */
                max-width: 1120px;
                max-height: 630px;
                border-radius: 16px;
                overflow: hidden;
                box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7), 0 0 50px rgba(0, 188, 212, 0.15);
                border: 1px solid rgba(255, 255, 255, 0.05);
            }
        }

        /* Loading spinner styling */
        .loading-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #000;
            color: #fff;
            z-index: 10;
            transition: opacity 0.5s ease;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border-left-color: #00bcd4;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="viewport-wrapper">
        <div class="player-container">
            <!-- Loading Indicator -->
            <div id="loading" class="loading-overlay">
                <div class="spinner"></div>
                <div id="loading-text">Requesting secure stream session...</div>
            </div>

            <!-- Target Iframe (Sandboxed with allow-forms to enable the POST request redirect) -->
            <iframe 
                id="player-iframe"
                name="player-iframe"
                src="about:blank"
                allow="autoplay *; fullscreen *; picture-in-picture *; encrypted-media *"
                allowfullscreen
                webkitallowfullscreen
                mozallowfullscreen
                sandbox="allow-scripts allow-same-origin allow-presentation allow-forms">
            </iframe>
        </div>
    </div>

    <script>
        async function fetchScrapedData() {
            const embedPageUrl = 'https://sportika.net/api/embed/tv/tsn-1';
            const proxies = [
                'https://api.allorigins.win/raw?url=' + encodeURIComponent(embedPageUrl),
                'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(embedPageUrl)
            ];

            for (const proxyUrl of proxies) {
                try {
                    console.log('Attempting fetch via proxy:', proxyUrl);
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 6000); // 6 seconds timeout

                    const response = await fetch(proxyUrl, { signal: controller.signal });
                    clearTimeout(timeoutId);

                    if (response.ok) {
                        const htmlText = await response.text();
                        if (htmlText && htmlText.includes('private-embed-form')) {
                            console.log('Successfully fetched embed configuration using:', proxyUrl);
                            return htmlText;
                        }
                    }
                } catch (e) {
                    console.warn('Proxy failed or timed out:', proxyUrl, e);
                }
            }
            throw new Error('All CORS proxies failed to fetch the stream configuration.');
        }

        async function loadStream() {
            const loadingEl = document.getElementById('loading');
            const loadingText = document.getElementById('loading-text');

            try {
                // Fetch the embed configurations with proxy redundancy
                const htmlText = await fetchScrapedData();

                // Parse the DOM of the retrieved page
                const parser = new DOMParser();
                const doc = parser.parseFromString(htmlText, 'text/html');

                // Extract post target and hidden security tokens
                const origForm = doc.getElementById('private-embed-form');
                if (!origForm) throw new Error('Target embed configuration form not found');

                const action = origForm.getAttribute('action');
                const expires = doc.querySelector('input[name="expires"]')?.value;
                const token = doc.querySelector('input[name="token"]')?.value;
                const scope = doc.querySelector('input[name="scope"]')?.value;

                if (!action || !token) throw new Error('Required secure keys are missing');

                // Programmatically construct and submit a POST form directly to the inner iframe
                const form = document.createElement('form');
                form.method = 'POST';
                form.action = action;
                form.target = 'player-iframe';
                form.style.display = 'none';

                const addInput = (name, value) => {
                    const input = document.createElement('input');
                    input.type = 'hidden';
                    input.name = name;
                    input.value = value;
                    form.appendChild(input);
                };

                addInput('expires', expires);
                addInput('token', token);
                addInput('scope', scope);

                document.body.appendChild(form);
                form.submit();
                document.body.removeChild(form);

                // Watch the sandboxed player frame load, then fade out the spinner
                const iframe = document.getElementById('player-iframe');
                
                // Fallback timeout: force loader removal after 6 seconds in case load event fails to fire
                const forceRemoveLoader = setTimeout(() => {
                    loadingEl.style.opacity = '0';
                    setTimeout(() => loadingEl.style.display = 'none', 500);
                }, 6000);

                iframe.onload = () => {
                    clearTimeout(forceRemoveLoader);
                    setTimeout(() => {
                        loadingEl.style.opacity = '0';
                        setTimeout(() => loadingEl.style.display = 'none', 500);
                    }, 1000);
                };

            } catch (error) {
                console.error('Loader Error:', error);
                loadingText.style.color = '#ff4444';
                loadingText.innerText = 'Failed to load live video feed. Please reload the page.';
            }
        }

        document.addEventListener('DOMContentLoaded', loadStream);
    </script>
</body>
</html>
